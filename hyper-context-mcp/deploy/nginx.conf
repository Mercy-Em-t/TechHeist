server {
    listen 443 ssl http2; # Activate HTTP/2 for encrypted multiplexed streams
    server_name core.tmsavannah.com;

    ssl_certificate /etc/letsencrypt/live/core.tmsavannah.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.tmsavannah.com/privkey.pem;

    # LAYER 6: Extreme Cryptography Configuration
    ssl_protocols TLSv1.3; # Absolute ban on TLS 1.0, 1.1, and 1.2
    ssl_prefer_server_ciphers off;

    # LAYER 5/6: HSTS (HTTP Strict Transport Security) - Lock to HTTPS for 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Anti-Clickjacking & XSS Application Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" always;

    location / {
        # LAYER 4: Limiting maximum payload body sizes to stop buffer overflow exploits
        client_max_body_size 2m;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
