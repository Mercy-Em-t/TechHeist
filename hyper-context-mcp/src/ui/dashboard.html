<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyper-Context Graph Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --card-bg: rgba(31, 40, 51, 0.4);
      --border: rgba(102, 252, 241, 0.2);
      --accent: #66fcf1;
      --text: #c5c6c7;
      --heading: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top left, #1f2833 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    header {
      padding: 2rem;
      background: rgba(11, 12, 16, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 {
      color: var(--accent);
      font-weight: 800;
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--heading);
    }
    .dot {
      width: 10px; height: 10px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(102, 252, 241, 0); }
      100% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0); }
    }
    main {
      padding: 3rem;
      flex-grow: 1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }
    .node-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .node-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .node-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-color: rgba(102, 252, 241, 0.5);
    }
    .node-card:hover::before { opacity: 1; }
    .node-title {
      color: var(--heading);
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .node-id {
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 1rem;
      font-family: monospace;
      padding: 0.2rem 0.5rem;
      background: rgba(102, 252, 241, 0.1);
      border-radius: 4px;
      display: inline-block;
    }
    .node-content {
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #e0e0e0;
      transition: background 0.2s ease;
    }
    .tag:hover { background: rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body>
  <header>
    <h1>Hyper-Context Topology</h1>
    <div class="status-indicator">
      <div class="dot"></div>
      Engine Live
    </div>
  </header>
  <main>
    <div class="grid" id="graph-container">
      <!-- Nodes rendered here -->
    </div>
  </main>
  <script>
    async function fetchState() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        renderGraph(data);
      } catch (e) {
        console.error('Failed to fetch state', e);
      }
    }

    function renderGraph(data) {
      const container = document.getElementById('graph-container');
      container.innerHTML = '';
      if(!data.nodes) return;
      
      Object.values(data.nodes).forEach(node => {
        const card = document.createElement('div');
        card.className = 'node-card';
        
        const tagsHtml = (node.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
        
        card.innerHTML = `
          <div class="node-id">${node.id}</div>
          <div class="node-title">${node.title}</div>
          <div class="node-content">${node.content}</div>
          <div class="tags">${tagsHtml}</div>
        `;
        container.appendChild(card);
      });
    }

    // Auto-refresh every 2 seconds
    fetchState();
    setInterval(fetchState, 2000);
  </script>
</body>
</html>
